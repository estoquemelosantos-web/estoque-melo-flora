<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melo Flora - Gestão de Estoque Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --melo-blue: #1e3a8a; }
        .sidebar-item.active { background-color: var(--melo-blue); color: white; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
        .btn-melo { background-color: var(--melo-blue); transition: all 0.2s ease; }
        .btn-melo:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .logo-box { 
            width: 100%; 
            height: 140px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 1.5rem; 
            overflow: hidden; 
            background: white; 
            border: 2px solid #f1f5f9; 
            cursor: pointer;
            position: relative;
        }
        .logo-box:hover::after {
            content: "TROCAR FOTO";
            position: absolute;
            inset: 0;
            background: rgba(30, 58, 138, 0.8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 900;
        }
        #main-logo-img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r flex flex-col shadow-lg z-20">
            <div class="p-6 border-b text-center">
                <div class="logo-box" onclick="document.getElementById('in-logo-file').click()">
                    <img src="logo.jpeg" id="main-logo-img" alt="Logo">
                    <input type="file" id="in-logo-file" class="hidden" accept="image/*" onchange="window.ui.handleLogoUpload(this)">
                </div>
                <div class="mt-4">
                    <h1 class="text-sm font-black text-blue-900 uppercase tracking-widest">Melo Flora</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Estoque Local</p>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto p-4" id="category-list"></nav>

            <div class="p-4 border-t bg-slate-50 flex flex-col gap-2">
                <button onclick="window.ui.showModal('modal-cat')" class="w-full btn-melo text-white py-3.5 rounded-xl font-black text-sm shadow-md flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> NOVA PÁGINA
                </button>
                
                <div class="grid grid-cols-1 gap-2 mt-2">
                    <button onclick="window.ui.exportCSV()" class="text-[9px] font-black uppercase tracking-widest bg-green-50 border border-green-200 py-2.5 rounded-lg text-green-700 hover:bg-green-100 flex items-center justify-center gap-2">
                        <i class="fas fa-file-excel"></i> Planilha Google
                    </button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.ui.exportBackup()" class="text-[9px] font-black uppercase tracking-widest bg-white border py-2 rounded-lg text-slate-500 hover:bg-slate-100">
                            <i class="fas fa-download mr-1"></i> Backup
                        </button>
                        <label class="text-[9px] font-black uppercase tracking-widest bg-white border py-2 rounded-lg text-slate-500 hover:bg-slate-100 text-center cursor-pointer">
                            <i class="fas fa-upload mr-1"></i> Importar
                            <input type="file" class="hidden" accept=".json" onchange="window.ui.importBackup(this)">
                        </label>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            <header class="h-20 bg-white border-b px-10 flex justify-between items-center shadow-sm">
                <h2 id="header-title" class="text-xl font-black text-blue-900 uppercase tracking-tight">Estoque Melo Flora</h2>
                <div id="header-actions" class="hidden flex gap-2">
                    <button onclick="window.ui.showModal('modal-item')" class="btn-melo text-white px-6 py-2.5 rounded-xl font-black text-xs">NOVO PRODUTO</button>
                    <button onclick="window.ui.deleteCategory()" class="text-red-500 w-10 h-10 rounded-xl bg-red-50 flex items-center justify-center border border-red-100 hover:bg-red-500 hover:text-white transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-10">
                <div id="empty-view" class="h-full flex flex-col items-center justify-center text-slate-300">
                    <i class="fas fa-leaf text-5xl mb-4 opacity-10"></i>
                    <p class="font-black uppercase tracking-widest text-[11px]">Selecione uma pasta lateral</p>
                </div>
                <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
            </div>
        </main>

        <!-- Modais -->
        <div id="modal-cat" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
                <h3 class="text-lg font-black text-blue-900 mb-6 uppercase">Criar Pasta</h3>
                <input type="text" id="in-cat-name" class="w-full bg-slate-50 border-2 rounded-2xl px-5 py-4 mb-6 outline-none focus:border-blue-900" placeholder="Ex: Adubos, Vasos...">
                <div class="flex gap-3">
                    <button onclick="window.ui.hideModals()" class="flex-1 py-4 font-bold text-slate-400">Sair</button>
                    <button onclick="window.ui.createCategory()" class="flex-1 py-4 btn-melo text-white font-black rounded-2xl">CRIAR</button>
                </div>
            </div>
        </div>

        <div id="modal-item" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 p-4">
            <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
                <h3 class="text-lg font-black text-blue-900 mb-6 uppercase">Novo Produto</h3>
                <input type="text" id="in-item-name" class="w-full bg-slate-50 border-2 rounded-2xl px-5 py-4 mb-4 outline-none focus:border-blue-900" placeholder="Nome do Produto">
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Quantidade</label>
                        <input type="number" id="in-item-qty" class="w-full bg-slate-50 border-2 rounded-2xl px-5 py-4 text-center font-bold" value="0">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Unidade</label>
                        <select id="in-item-unit" class="w-full bg-slate-50 border-2 rounded-2xl px-5 py-4 font-bold">
                            <option value="un">un</option><option value="kg">kg</option><option value="g">g</option><option value="L">L</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="window.ui.hideModals()" class="flex-1 py-4 font-bold text-slate-400">Sair</button>
                    <button onclick="window.ui.createItem()" class="flex-1 py-4 btn-melo text-white font-black rounded-2xl">GUARDAR</button>
                </div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl translate-y-32 transition-transform duration-500 z-50 shadow-xl">
            <span id="toast-text" class="font-black text-[10px] uppercase tracking-widest"></span>
        </div>
    </div>

    <script>
        const DB_KEY = 'melo_flora_local_v3';
        const LOGO_KEY = 'melo_flora_custom_logo';
        
        window.state = {
            categories: JSON.parse(localStorage.getItem(DB_KEY)) || [],
            currentId: null
        };

        window.ui = {
            init() {
                this.loadLogo();
                this.render();
            },

            loadLogo() {
                const savedLogo = localStorage.getItem(LOGO_KEY);
                if (savedLogo) {
                    document.getElementById('main-logo-img').src = savedLogo;
                }
            },

            handleLogoUpload(input) {
                if (input.files && input.files) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const base64 = e.target.result;
                        localStorage.setItem(LOGO_KEY, base64);
                        document.getElementById('main-logo-img').src = base64;
                        this.toast("Logo Atualizada!");
                    };
                    reader.readAsDataURL(input.files);
                }
            },

            save() {
                localStorage.setItem(DB_KEY, JSON.stringify(window.state.categories));
                this.render();
            },

            render() {
                const list = document.getElementById('category-list');
                list.innerHTML = '';
                
                window.state.categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `sidebar-item w-full text-left px-5 py-4 rounded-2xl mb-2 font-bold text-[11px] uppercase transition-all flex justify-between items-center ${window.state.currentId === cat.id ? 'active' : 'text-slate-400 hover:bg-slate-50'}`;
                    btn.innerHTML = `
                        <span><i class="fas fa-folder mr-2 opacity-30"></i> ${cat.name}</span>
                        <span class="bg-slate-100 text-slate-500 w-6 h-6 rounded-lg flex items-center justify-center text-[9px] ${window.state.currentId === cat.id ? 'bg-blue-800 text-white' : ''}">
                            ${cat.items ? cat.items.length : 0}
                        </span>
                    `;
                    btn.onclick = () => { window.state.currentId = cat.id; this.render(); };
                    list.appendChild(btn);
                });
                this.renderGrid();
            },

            renderGrid() {
                const grid = document.getElementById('items-grid');
                const cat = window.state.categories.find(c => c.id === window.state.currentId);
                
                if (!cat) { 
                    document.getElementById('empty-view').classList.remove('hidden'); 
                    document.getElementById('header-actions').classList.add('hidden'); 
                    document.getElementById('header-title').textContent = "Estoque Melo Flora";
                    grid.innerHTML = ''; 
                    return; 
                }

                document.getElementById('empty-view').classList.add('hidden');
                document.getElementById('header-actions').classList.remove('hidden');
                document.getElementById('header-title').textContent = cat.name;
                grid.innerHTML = '';
                
                if (cat.items && cat.items.length > 0) {
                    cat.items.forEach(item => {
                        const d = document.createElement('div');
                        d.className = "bg-white p-7 rounded-[2rem] border shadow-sm flex flex-col justify-between hover:shadow-md transition-all group";
                        d.innerHTML = `
                            <div class="flex justify-between items-start mb-6">
                                <h4 class="font-black text-blue-900 text-sm truncate uppercase">${item.name}</h4>
                                <button onclick="window.ui.deleteItem('${item.id}')" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all">
                                    <i class="fas fa-times-circle"></i>
                                </button>
                            </div>
                            <div class="flex justify-between items-end border-t border-slate-50 pt-5">
                                <span class="text-3xl font-black text-blue-900">${item.qty}<small class="text-[10px] ml-1 opacity-30 uppercase font-bold">${item.unit}</small></span>
                                <div class="flex gap-2">
                                    <button onclick="window.ui.adjust('${item.id}', -1)" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl hover:bg-red-500 hover:text-white transition-all font-bold shadow-sm">-</button>
                                    <button onclick="window.ui.adjust('${item.id}', 1)" class="w-10 h-10 bg-slate-50 text-slate-400 rounded-xl hover:bg-green-600 hover:text-white transition-all font-bold shadow-sm">+</button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(d);
                    });
                } else {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest">Nenhum produto aqui</div>`;
                }
            },

            createCategory() {
                const n = document.getElementById('in-cat-name').value.trim();
                if(!n) return;
                const nc = { id: 'c' + Date.now(), name: n, items: [] };
                window.state.categories.push(nc); 
                window.state.currentId = nc.id;
                document.getElementById('in-cat-name').value = '';
                this.hideModals(); this.save(); this.toast("Pasta Criada");
            },

            createItem() {
                const n = document.getElementById('in-item-name').value.trim();
                const q = parseFloat(document.getElementById('in-item-qty').value) || 0;
                const u = document.getElementById('in-item-unit').value;
                const cat = window.state.categories.find(c => c.id === window.state.currentId);
                
                if(n && cat) {
                    if(!cat.items) cat.items = [];
                    cat.items.push({ id: 'i' + Date.now(), name: n, qty: q, unit: u });
                    document.getElementById('in-item-name').value = '';
                    document.getElementById('in-item-qty').value = '0';
                    this.hideModals(); this.save(); this.toast("Produto Guardado");
                }
            },

            adjust(id, val) {
                const cat = window.state.categories.find(c => c.id === window.state.currentId);
                const item = cat.items.find(i => i.id == id);
                if (item) {
                    item.qty = Math.max(0, parseFloat((item.qty + val).toFixed(2)));
                    this.save();
                }
            },

            deleteItem(id) {
                if(confirm("Apagar este produto?")) {
                    const cat = window.state.categories.find(c => c.id === window.state.currentId);
                    cat.items = cat.items.filter(i => i.id !== id);
                    this.save();
                }
            },

            deleteCategory() { 
                if(confirm("Deseja apagar esta pasta e tudo o que está dentro dela?")) { 
                    window.state.categories = window.state.categories.filter(c => c.id !== window.state.currentId); 
                    window.state.currentId = null; 
                    this.save(); 
                } 
            },

            exportBackup() {
                const dataStr = JSON.stringify(window.state.categories, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `estoque_melo_flora_backup.json`;
                a.click();
                this.toast("Backup Criado");
            },

            exportCSV() {
                let csvContent = "\uFEFF"; // BOM para acentos corretos no Excel
                csvContent += "Categoria;Produto;Quantidade;Unidade\n";
                
                window.state.categories.forEach(cat => {
                    if(cat.items) {
                        cat.items.forEach(item => {
                            csvContent += `${cat.name};${item.name};${item.qty};${item.unit}\n`;
                        });
                    }
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "estoque_melo_flora.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                this.toast("Planilha Gerada!");
            },

            importBackup(input) {
                if (!input.files || input.files.length === 0) return;
                const file = input.files;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        if (Array.isArray(imported)) {
                            window.state.categories = imported;
                            window.state.currentId = null;
                            this.save();
                            this.toast("Dados Restaurados!");
                        }
                    } catch (err) {
                        this.toast("Erro ao ler backup");
                    }
                };
                reader.readAsText(file);
                input.value = ''; 
            },

            showModal(id) { document.getElementById(id).classList.replace('hidden', 'flex'); },
            hideModals() { document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.replace('flex', 'hidden')); },
            toast(m) { 
                const t = document.getElementById('toast'); 
                document.getElementById('toast-text').textContent = m; 
                t.classList.remove('translate-y-32'); 
                setTimeout(() => t.classList.add('translate-y-32'), 2500); 
            }
        };

        window.ui.init();
    </script>
</body>
</html>
