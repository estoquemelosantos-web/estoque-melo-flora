<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melo Flora | Gestão Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --brand-primary: #1e3a8a;
            --brand-secondary: #3b82f6;
            --bg-main: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .sidebar-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-link.active {
            background-color: var(--brand-primary);
            color: white;
            transform: translateX(4px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.2);
        }

        .logo-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: white;
            border: 2px dashed #e2e8f0;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s;
        }

        .logo-container:hover { border-color: var(--brand-secondary); }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1rem;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-pop { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body class="text-slate-900 antialiased">

    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Barra Lateral -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col z-30 shadow-xl">
            <div class="p-8">
                <div class="logo-container group" onclick="document.getElementById('file-logo').click()">
                    <img id="display-logo" src="" alt="Logo Melo Flora" class="hidden">
                    <div id="placeholder-logo" class="flex flex-col items-center text-slate-400 group-hover:text-blue-600">
                        <i class="fas fa-cloud-upload-alt text-2xl mb-2"></i>
                        <span class="text-[10px] font-bold uppercase tracking-widest">Logo da Empresa</span>
                    </div>
                </div>
                <input type="file" id="file-logo" class="hidden" accept="image/*">
                
                <div class="mt-6 text-center">
                    <h1 class="text-lg font-extrabold text-blue-950 tracking-tight">Melo Flora</h1>
                    <div class="inline-flex items-center gap-1.5 px-3 py-1 bg-blue-50 text-blue-600 rounded-full mt-2">
                        <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></span>
                        <span class="text-[10px] font-black uppercase tracking-tighter">Sistema Local</span>
                    </div>
                </div>
            </div>

            <!-- Navegação de Categorias -->
            <div class="flex-1 overflow-y-auto px-4 custom-scrollbar" id="nav-categories">
                <!-- Injetado via JS -->
            </div>

            <!-- Rodapé da Sidebar -->
            <div class="p-6 border-t border-slate-100 bg-slate-50/50 space-y-3">
                <button onclick="App.ui.openModal('modal-category')" class="w-full bg-blue-900 hover:bg-blue-800 text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-900/20 transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-folder-plus"></i> NOVA PASTA
                </button>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="App.data.exportJSON()" class="bg-white border border-slate-200 py-3 rounded-xl text-[10px] font-black text-slate-500 hover:bg-slate-100 uppercase tracking-widest">
                        <i class="fas fa-download mr-1"></i> Backup
                    </button>
                    <label class="bg-white border border-slate-200 py-3 rounded-xl text-[10px] font-black text-slate-500 hover:bg-slate-100 uppercase tracking-widest text-center cursor-pointer">
                        <i class="fas fa-upload mr-1"></i> Importar
                        <input type="file" id="file-import" class="hidden" accept=".json">
                    </label>
                </div>
                <button onclick="App.data.exportCSV()" class="w-full bg-emerald-50 text-emerald-700 border border-emerald-100 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-100">
                    <i class="fas fa-file-csv mr-2"></i> Exportar Planilha
                </button>
            </div>
        </aside>

        <!-- Área Principal -->
        <main class="flex-1 flex flex-col relative">
            <header class="h-24 bg-white/80 backdrop-blur-md border-b border-slate-200 px-12 flex items-center justify-between z-20">
                <div id="header-info">
                    <h2 id="view-title" class="text-2xl font-extrabold text-blue-950">Bem-vindo</h2>
                    <p id="view-subtitle" class="text-sm text-slate-400 font-medium italic">Selecione uma categoria para gerir</p>
                </div>
                <div id="header-tools" class="hidden flex items-center gap-4">
                    <button onclick="App.ui.openModal('modal-product')" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-600/20">
                        + NOVO PRODUTO
                    </button>
                    <button onclick="App.logic.removeCategory()" class="w-12 h-12 flex items-center justify-center text-slate-300 hover:text-red-500 transition-colors">
                        <i class="fas fa-trash-alt text-lg"></i>
                    </button>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto p-12 custom-scrollbar bg-slate-50" id="main-content">
                <!-- Grid de Produtos ou Estado Vazio -->
            </div>
        </main>

        <!-- Modais -->
        <div id="modal-category" class="fixed inset-0 bg-blue-950/40 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
            <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl animate-pop">
                <h3 class="text-xl font-black text-blue-950 mb-2">CRIAR PASTA</h3>
                <p class="text-slate-400 text-sm mb-8">Organize os seus produtos por tipo ou local.</p>
                <input type="text" id="new-cat-name" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl px-6 py-5 outline-none transition-all font-bold" placeholder="Ex: Sementes de Inverno">
                <div class="flex gap-4 mt-10">
                    <button onclick="App.ui.closeModals()" class="flex-1 text-slate-400 font-bold hover:text-slate-600">Cancelar</button>
                    <button onclick="App.logic.addCategory()" class="flex-1 bg-blue-900 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-900/20 uppercase tracking-widest text-xs">Criar Pasta</button>
                </div>
            </div>
        </div>

        <div id="modal-product" class="fixed inset-0 bg-blue-950/40 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
            <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl animate-pop">
                <h3 class="text-xl font-black text-blue-950 mb-2 uppercase">Novo Item</h3>
                <div class="space-y-6 mt-8">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nome do Produto</label>
                        <input type="text" id="prod-name" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all font-bold">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Qtd. Inicial</label>
                            <input type="number" id="prod-qty" value="0" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all font-bold text-center">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Unidade</label>
                            <select id="prod-unit" class="w-full bg-slate-100 border-2 border-transparent focus:border-blue-600 focus:bg-white rounded-2xl px-6 py-4 outline-none transition-all font-bold">
                                <option value="un">Unidades (un)</option>
                                <option value="kg">Quilos (kg)</option>
                                <option value="L">Litros (L)</option>
                                <option value="g">Gramas (g)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4 mt-10">
                    <button onclick="App.ui.closeModals()" class="flex-1 text-slate-400 font-bold">Cancelar</button>
                    <button onclick="App.logic.addProduct()" class="flex-1 bg-blue-900 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-900/20 uppercase tracking-widest text-xs">Salvar Produto</button>
                </div>
            </div>
        </div>

        <!-- Notificação -->
        <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-50 translate-y-40 transition-transform duration-500">
            <span id="toast-msg" class="text-xs font-black uppercase tracking-widest"></span>
        </div>
    </div>

    <script>
        /**
         * MELO FLORA - SISTEMA DE GESTÃO DE ESTOQUE
         * Versão Final Corrigida - Fix Import/FileReader
         */
        
        const App = {
            state: {
                categories: JSON.parse(localStorage.getItem('mf_data')) || [],
                activeCategoryId: null,
            },

            init() {
                this.events();
                this.ui.loadLogo();
                this.ui.renderSidebar();
                this.ui.renderContent();
            },

            events() {
                // Evento de Logo - Corrigido para files
                const logoInput = document.getElementById('file-logo');
                logoInput.onchange = (e) => {
                    const file = e.target.files;
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        localStorage.setItem('mf_logo', event.target.result);
                        App.ui.loadLogo();
                        App.ui.toast("Logo carregada!");
                    };
                    reader.readAsDataURL(file);
                };

                // Evento de Importação - Corrigido para files
                const importInput = document.getElementById('file-import');
                importInput.onchange = (e) => {
                    const file = e.target.files;
                    if (!file) return;

                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const raw = JSON.parse(event.target.result);
                            // Verificação de estrutura de dados
                            const data = raw.db || (Array.isArray(raw) ? raw : []);
                            
                            App.state.categories = data;
                            if (raw.logo) localStorage.setItem('mf_logo', raw.logo);
                            
                            App.state.activeCategoryId = null;
                            App.logic.sync();
                            App.ui.loadLogo();
                            App.ui.toast("Dados restaurados com sucesso!");
                        } catch (err) {
                            console.error(err);
                            App.ui.toast("Erro: Arquivo JSON inválido.");
                        }
                    };
                    reader.readAsText(file);
                    e.target.value = ''; // Reset input
                };
            },

            logic: {
                sync() {
                    localStorage.setItem('mf_data', JSON.stringify(App.state.categories));
                    App.ui.renderSidebar();
                    App.ui.renderContent();
                },

                addCategory() {
                    const name = document.getElementById('new-cat-name').value.trim();
                    if (!name) return;

                    const newCat = {
                        id: crypto.randomUUID(),
                        name: name,
                        items: []
                    };

                    App.state.categories.push(newCat);
                    App.state.activeCategoryId = newCat.id;
                    document.getElementById('new-cat-name').value = '';
                    App.ui.closeModals();
                    this.sync();
                },

                removeCategory() {
                    if (!confirm("Remover esta pasta permanentemente?")) return;
                    App.state.categories = App.state.categories.filter(c => c.id !== App.state.activeCategoryId);
                    App.state.activeCategoryId = null;
                    this.sync();
                },

                addProduct() {
                    const name = document.getElementById('prod-name').value.trim();
                    const qty = parseFloat(document.getElementById('prod-qty').value) || 0;
                    const unit = document.getElementById('prod-unit').value;

                    if (!name || !App.state.activeCategoryId) return;

                    const cat = App.state.categories.find(c => c.id === App.state.activeCategoryId);
                    if (cat) {
                        cat.items.push({ id: crypto.randomUUID(), name, qty, unit });
                        App.ui.closeModals();
                        this.sync();
                    }
                },

                adjustStock(prodId, amount) {
                    const cat = App.state.categories.find(c => c.id === App.state.activeCategoryId);
                    const item = cat?.items.find(i => i.id === prodId);
                    if (item) {
                        item.qty = Math.max(0, parseFloat((item.qty + amount).toFixed(2)));
                        this.sync();
                    }
                },

                deleteProduct(prodId) {
                    const cat = App.state.categories.find(c => c.id === App.state.activeCategoryId);
                    if (cat) {
                        cat.items = cat.items.filter(i => i.id !== prodId);
                        this.sync();
                    }
                }
            },

            data: {
                exportJSON() {
                    const payload = {
                        db: App.state.categories,
                        logo: localStorage.getItem('mf_logo'),
                        date: new Date().toISOString()
                    };
                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `melo_flora_backup.json`;
                    a.click();
                },

                exportCSV() {
                    let csv = "\uFEFFCategoria;Produto;Quantidade;Unidade\n";
                    App.state.categories.forEach(c => {
                        c.items.forEach(i => {
                            csv += `"${c.name}";"${i.name}";"${i.qty}";"${i.unit}"\n`;
                        });
                    });
                    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = "estoque_melo_flora.csv";
                    a.click();
                }
            },

            ui: {
                renderSidebar() {
                    const container = document.getElementById('nav-categories');
                    container.innerHTML = '';
                    App.state.categories.forEach(cat => {
                        const active = App.state.activeCategoryId === cat.id;
                        const btn = document.createElement('button');
                        btn.className = `sidebar-link w-full flex items-center justify-between p-5 rounded-2xl mb-3 font-bold text-xs uppercase tracking-widest ${active ? 'active' : 'text-slate-400 hover:bg-slate-50'}`;
                        btn.innerHTML = `
                            <span class="flex items-center gap-3"><i class="fas fa-folder text-lg opacity-40"></i>${cat.name}</span>
                            <span class="text-[10px] ${active ? 'bg-white/20' : 'bg-slate-100'} px-2 py-1 rounded-lg">${cat.items.length}</span>
                        `;
                        btn.onclick = () => { App.state.activeCategoryId = cat.id; this.renderSidebar(); this.renderContent(); };
                        container.appendChild(btn);
                    });
                },

                renderContent() {
                    const container = document.getElementById('main-content');
                    const cat = App.state.categories.find(c => c.id === App.state.activeCategoryId);
                    
                    if (!cat) {
                        document.getElementById('header-tools').classList.add('hidden');
                        document.getElementById('view-title').innerText = "Melo Flora";
                        container.innerHTML = `<div class="h-full flex items-center justify-center text-slate-200"><i class="fas fa-leaf text-9xl"></i></div>`;
                        return;
                    }

                    document.getElementById('header-tools').classList.remove('hidden');
                    document.getElementById('view-title').innerText = cat.name;
                    
                    let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                    cat.items.forEach(item => {
                        html += `
                            <div class="glass-card p-6 rounded-[2rem] border border-slate-100">
                                <div class="flex justify-between mb-6">
                                    <span class="bg-blue-50 text-blue-800 p-3 rounded-xl"><i class="fas fa-box"></i></span>
                                    <button onclick="App.logic.deleteProduct('${item.id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                </div>
                                <h4 class="font-black text-blue-900 uppercase truncate">${item.name}</h4>
                                <p class="text-[10px] text-slate-400 mb-6 uppercase font-bold">${item.unit}</p>
                                <div class="flex items-center justify-between bg-white p-2 rounded-xl shadow-sm border border-slate-50">
                                    <button onclick="App.logic.adjustStock('${item.id}', -1)" class="w-10 h-10 bg-slate-50 rounded-lg font-bold">-</button>
                                    <div class="text-center"><span class="block text-xl font-black">${item.qty}</span></div>
                                    <button onclick="App.logic.adjustStock('${item.id}', 1)" class="w-10 h-10 bg-slate-50 rounded-lg font-bold">+</button>
                                </div>
                            </div>
                        `;
                    });
                    container.innerHTML = html + `</div>`;
                },

                loadLogo() {
                    const data = localStorage.getItem('mf_logo');
                    const img = document.getElementById('display-logo');
                    const ph = document.getElementById('placeholder-logo');
                    if (data) { img.src = data; img.classList.remove('hidden'); ph.classList.add('hidden'); }
                },

                openModal(id) { document.getElementById(id).classList.replace('hidden', 'flex'); },
                closeModals() { document.querySelectorAll('.fixed.inset-0').forEach(m => m.classList.replace('flex', 'hidden')); },
                toast(msg) {
                    const t = document.getElementById('toast');
                    document.getElementById('toast-msg').innerText = msg;
                    t.classList.remove('translate-y-40');
                    setTimeout(() => t.classList.add('translate-y-40'), 3000);
                }
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
